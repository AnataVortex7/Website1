<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Watch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --card-w: 85px;
      --card-h: 130px;
      --font-s: 85px;
      --bg: #0a0a0a;
      --card-bg: #151515;
      --accent: #fff;
    }

    @media (max-width: 768px) {
      :root {
        --card-w: 55px;
        --card-h: 85px;
        --font-s: 55px;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--accent);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* === MAIN FLIP CLOCK === */
    .clock-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: nowrap;
    }

    .flip-unit {
      display: flex;
      gap: 6px;
    }

    .flip-card {
      position: relative;
      width: var(--card-w);
      height: var(--card-h);
      background: var(--card-bg);
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: var(--font-s);
      line-height: var(--card-h);
      text-align: center;
      color: var(--accent);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      perspective: 400px;
    }

    /* Center line */
    .flip-card::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: #000;
      z-index: 10;
      transform: translateY(-50%);
      box-shadow: 0 1px 0 rgba(255,255,255,0.06);
    }

    /* All layers */
    .top, .bottom, .top-flip, .bottom-flip {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      background: var(--card-bg);
    }

    .top, .top-flip {
      top: 0;
      border-radius: 8px 8px 0 0;
    }

    .bottom, .bottom-flip {
      bottom: 0;
      border-radius: 0 0 8px 8px;
    }

    /* Text positioning */
    .top span, .bottom span, .top-flip span, .bottom-flip span {
      position: absolute;
      left: 0;
      width: 100%;
      display: block;
    }

    .top span, .top-flip span {
      top: 0;
    }

    .bottom span, .bottom-flip span {
      top: calc(var(--card-h) / -2);
    }

    /* Flip layers */
    .top-flip, .bottom-flip {
      backface-visibility: hidden;
      z-index: 5;
    }

    .top-flip {
      transform-origin: bottom;
    }

    .bottom-flip {
      transform-origin: top;
      transform: rotateX(90deg);
    }

    /* Animations */
    .flip-card.flip .top-flip {
      animation: flipTop 0.6s ease-in forwards;
    }

    .flip-card.flip .bottom-flip {
      animation: flipBottom 0.6s ease-out 0.6s forwards;
    }

    @keyframes flipTop {
      0% { transform: rotateX(0deg); }
      100% { transform: rotateX(-90deg); opacity: 0; }
    }

    @keyframes flipBottom {
      0% { transform: rotateX(90deg); opacity: 1; }
      100% { transform: rotateX(0deg); opacity: 1; }
    }

    .separator {
      font-family: 'Bebas Neue', sans-serif;
      font-size: var(--font-s);
      line-height: var(--card-h);
      color: var(--accent);
      padding: 0 4px;
      animation: blink 1s infinite;
      user-select: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .clock-label {
      margin-top: 24px;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #555;
      text-align: center;
    }

    .date-display {
      margin-top: 8px;
      font-size: 15px;
      color: #444;
      letter-spacing: 2px;
      text-align: center;
    }

    /* === FLOATING STUDY TIMER (TOP RIGHT) === */
    .timer-float {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(21, 21, 21, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 18px;
      z-index: 1000;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .timer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .timer-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #888;
      font-weight: 600;
    }

    .timer-dots {
      display: flex;
      gap: 4px;
    }

    .timer-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
      transition: background 0.3s;
    }

    .timer-dot.active {
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
    }

    .timer-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      line-height: 1;
      color: #fff;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .timer-controls {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .timer-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: all 0.2s;
      padding: 0;
    }

    .timer-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    .timer-btn.play { color: #4ade80; }
    .timer-btn.pause { color: #fbbf24; }
    .timer-btn.reset { color: #f87171; }

    @media (max-width: 768px) {
      .timer-float { transform: scale(0.85); right: 8px; top: 8px; }
      .clock-wrapper { gap: 6px; }
    }
  </style>
</head>
<body>

  <div class="clock-wrapper">
    <div class="flip-unit" id="hours">
      <div class="flip-card" data-val="0">
        <div class="top"><span>0</span></div>
        <div class="bottom"><span>0</span></div>
        <div class="top-flip"><span>0</span></div>
        <div class="bottom-flip"><span>0</span></div>
      </div>
      <div class="flip-card" data-val="0">
        <div class="top"><span>0</span></div>
        <div class="bottom"><span>0</span></div>
        <div class="top-flip"><span>0</span></div>
        <div class="bottom-flip"><span>0</span></div>
      </div>
    </div>

    <div class="separator">:</div>

    <div class="flip-unit" id="minutes">
      <div class="flip-card" data-val="0">
        <div class="top"><span>0</span></div>
        <div class="bottom"><span>0</span></div>
        <div class="top-flip"><span>0</span></div>
        <div class="bottom-flip"><span>0</span></div>
      </div>
      <div class="flip-card" data-val="0">
        <div class="top"><span>0</span></div>
        <div class="bottom"><span>0</span></div>
        <div class="top-flip"><span>0</span></div>
        <div class="bottom-flip"><span>0</span></div>
      </div>
    </div>

    <div class="separator">:</div>

    <div class="flip-unit" id="seconds">
      <div class="flip-card" data-val="0">
        <div class="top"><span>0</span></div>
        <div class="bottom"><span>0</span></div>
        <div class="top-flip"><span>0</span></div>
        <div class="bottom-flip"><span>0</span></div>
      </div>
      <div class="flip-card" data-val="0">
        <div class="top"><span>0</span></div>
        <div class="bottom"><span>0</span></div>
        <div class="top-flip"><span>0</span></div>
        <div class="bottom-flip"><span>0</span></div>
      </div>
    </div>
  </div>

  <div class="clock-label">Current Time</div>
  <div class="date-display" id="dateDisplay"></div>

  <!-- Floating Study Timer -->
  <div class="timer-float">
    <div class="timer-header">
      <span class="timer-title">Study Timer</span>
      <div class="timer-dots">
        <div class="timer-dot" id="dot1"></div>
        <div class="timer-dot" id="dot2"></div>
      </div>
    </div>
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="timer-controls">
      <button class="timer-btn play" onclick="startTimer()" title="Start">▶</button>
      <button class="timer-btn pause" onclick="pauseTimer()" title="Pause">⏸</button>
      <button class="timer-btn reset" onclick="resetTimer()" title="Reset">↺</button>
    </div>
  </div>

  <script>
    // === MAIN FLIP CLOCK ===
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');

      updateUnit('hours', h);
      updateUnit('minutes', m);
      updateUnit('seconds', s);

      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-IN', options);
    }

    function updateUnit(id, val) {
      const unit = document.getElementById(id);
      const cards = unit.querySelectorAll('.flip-card');
      updateDigit(cards[0], val[0]);
      updateDigit(cards[1], val[1]);
    }

    function updateDigit(card, newVal) {
      const oldVal = card.getAttribute('data-val');
      if (oldVal === newVal) return;

      const top = card.querySelector('.top span');
      const bottom = card.querySelector('.bottom span');
      const topFlip = card.querySelector('.top-flip span');
      const bottomFlip = card.querySelector('.bottom-flip span');

      topFlip.textContent = oldVal;
      bottomFlip.textContent = newVal;
      top.textContent = newVal;
      bottom.textContent = newVal;

      card.classList.add('flip');

      setTimeout(() => {
        // Reset flip layers to match static layers before removing animation
        topFlip.textContent = newVal;
        bottomFlip.textContent = newVal;
        card.classList.remove('flip');
      }, 1200);

      card.setAttribute('data-val', newVal);
    }

    setInterval(updateClock, 1000);
    updateClock();

    // === FLOATING STUDY TIMER ===
    let timerInterval = null;
    let timerSeconds = 0;
    let timerRunning = false;

    const timerDisplay = document.getElementById('timerDisplay');
    const dot1 = document.getElementById('dot1');
    const dot2 = document.getElementById('dot2');

    function formatTime(sec) {
      const h = String(Math.floor(sec / 3600)).padStart(2, '0');
      const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function updateDots() {
      if (timerRunning) {
        dot1.classList.toggle('active');
        dot2.classList.toggle('active');
      }
    }

    function startTimer() {
      if (timerRunning) return;
      timerRunning = true;
      dot1.classList.add('active');
      dot2.classList.add('active');
      timerInterval = setInterval(() => {
        timerSeconds++;
        timerDisplay.textContent = formatTime(timerSeconds);
        updateDots();
      }, 1000);
    }

    function pauseTimer() {
      timerRunning = false;
      clearInterval(timerInterval);
      dot1.classList.remove('active');
      dot2.classList.remove('active');
    }

    function resetTimer() {
      pauseTimer();
      timerSeconds = 0;
      timerDisplay.textContent = formatTime(0);
    }

    timerDisplay.textContent = formatTime(0);
  </script>

</body>
</html>
