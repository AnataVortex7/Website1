<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Code Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 14px 20px;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f0f0f;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .model-badge {
      margin-left: auto;
      font-size: 11px;
      color: #666;
      background: #1a1a1a;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.ai {
      background: #111;
      border: 1px solid #1f1f1f;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg.ai code {
      background: #1a1a1a;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }
    .msg.ai pre {
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg.ai pre code {
      background: none;
      padding: 0;
    }
    .msg-meta {
      font-size: 10px;
      color: #444;
      margin-top: 6px;
    }
    .thinking {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 16px;
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .thinking span {
      width: 6px; height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-4px); opacity: 1; }
    }

    /* File preview */
    .file-preview {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      align-self: flex-end;
      max-width: 80%;
    }
    .file-icon { font-size: 20px; }
    .file-info { flex: 1; }
    .file-name { font-size: 13px; font-weight: 500; }
    .file-size { font-size: 11px; color: #666; }

    /* Download buttons */
    .download-files {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .dl-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #4ade80;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .dl-btn:hover { background: #252525; border-color: #4ade80; }

    /* Input area */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #1f1f1f;
      background: #0f0f0f;
    }
    .file-attached {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 10px;
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .file-attached.show { display: flex; }
    .remove-file {
      margin-left: auto;
      cursor: pointer;
      color: #666;
      font-size: 16px;
      line-height: 1;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .attach-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #888;
      width: 40px; height: 40px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .attach-btn:hover { border-color: #4ade80; color: #4ade80; }
    textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    textarea:focus { border-color: #3a3a5a; }
    textarea::placeholder { color: #444; }
    .send-btn {
      background: #4ade80;
      border: none;
      color: #000;
      width: 40px; height: 40px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .send-btn:hover { background: #3acc70; }
    .send-btn:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }

    /* Stats bar */
    .stats-bar {
      text-align: center;
      font-size: 11px;
      color: #333;
      padding: 6px;
    }

    /* Config panel */
    .config-panel {
      position: fixed;
      top: 0; right: -320px;
      width: 320px; height: 100vh;
      background: #0f0f0f;
      border-left: 1px solid #1f1f1f;
      padding: 20px;
      transition: right 0.3s;
      z-index: 100;
      overflow-y: auto;
    }
    .config-panel.open { right: 0; }
    .config-panel h2 { font-size: 15px; margin-bottom: 20px; }
    .config-panel label { font-size: 12px; color: #666; display: block; margin-bottom: 6px; }
    .config-panel input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 16px;
      outline: none;
    }
    .config-panel input:focus { border-color: #4ade80; }
    .save-btn {
      width: 100%;
      background: #4ade80;
      border: none;
      color: #000;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .settings-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #666;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .settings-btn:hover { color: #fff; border-color: #444; }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    .overlay.show { display: block; }
    .no-key-msg {
      text-align: center;
      padding: 40px 20px;
      color: #444;
    }
    .no-key-msg button {
      margin-top: 16px;
      background: #4ade80;
      border: none;
      color: #000;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeConfig()"></div>

<!-- Config Panel -->
<div class="config-panel" id="configPanel">
  <h2>⚙️ Settings</h2>
  <label>Groq API Key</label>
  <input type="password" id="apiKeyInput" placeholder="gsk_...">
  <label>Model (coding)</label>
  <input type="text" id="codeModelInput" value="llama-3.3-70b-versatile">
  <label>Model (chat)</label>
  <input type="text" id="chatModelInput" value="llama-3.1-8b-instant">
  <button class="save-btn" onclick="saveConfig()">Save</button>
</div>

<!-- Header -->
<div class="header">
  <div class="status-dot"></div>
  <h1>AI Code Assistant</h1>
  <span class="model-badge" id="modelBadge">⚡ 8B</span>
  <button class="settings-btn" onclick="openConfig()">⚙️ Settings</button>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <div class="no-key-msg" id="noKeyMsg">
    <div style="font-size: 40px; margin-bottom: 12px;">🤖</div>
    <div style="color: #888; margin-bottom: 6px;">Groq API Key नाही</div>
    <div style="font-size: 12px; color: #444;">Settings मध्ये API key टाका</div>
    <button onclick="openConfig()">⚙️ Settings उघड</button>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar" id="statsBar">🔢 Tokens: 0 | Requests: 0</div>

<!-- Input -->
<div class="input-area">
  <div class="file-attached" id="fileAttached">
    <span>📦</span>
    <span id="attachedFileName">file.zip</span>
    <span class="remove-file" onclick="removeFile()">✕</span>
  </div>
  <div class="input-row">
    <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Zip file attach करा">📎</button>
    <input type="file" id="fileInput" accept=".zip" style="display:none" onchange="onFileSelect(this)">
    <textarea id="msgInput" placeholder="Message टाका... (Shift+Enter = newline)" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  let stats = { tokens: 0, requests: 0 };
  let attachedFile = null;
  let isProcessing = false;

  // Config
  function getConfig() {
    return {
      apiKey: localStorage.getItem('groq_key') || '',
      codeModel: localStorage.getItem('code_model') || 'llama-3.3-70b-versatile',
      chatModel: localStorage.getItem('chat_model') || 'llama-3.1-8b-instant'
    };
  }

  function saveConfig() {
    localStorage.setItem('groq_key', document.getElementById('apiKeyInput').value);
    localStorage.setItem('code_model', document.getElementById('codeModelInput').value);
    localStorage.setItem('chat_model', document.getElementById('chatModelInput').value);
    closeConfig();
    checkKey();
  }

  function openConfig() {
    const cfg = getConfig();
    document.getElementById('apiKeyInput').value = cfg.apiKey;
    document.getElementById('codeModelInput').value = cfg.codeModel;
    document.getElementById('chatModelInput').value = cfg.chatModel;
    document.getElementById('configPanel').classList.add('open');
    document.getElementById('overlay').classList.add('show');
  }

  function closeConfig() {
    document.getElementById('configPanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  function checkKey() {
    const hasKey = !!getConfig().apiKey;
    document.getElementById('noKeyMsg').style.display = hasKey ? 'none' : 'block';
  }

  // File handling
  function onFileSelect(input) {
    const file = input.files[0];
    if (!file) return;
    attachedFile = file;
    document.getElementById('attachedFileName').textContent = `${file.name} (${(file.size/1024).toFixed(0)}KB)`;
    document.getElementById('fileAttached').classList.add('show');
    input.value = '';
  }

  function removeFile() {
    attachedFile = null;
    document.getElementById('fileAttached').classList.remove('show');
  }

  // Auto resize textarea
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // Add message to chat
  function addMsg(role, content, meta = '') {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    
    if (role === 'ai') {
      // Code blocks render करा
      content = content
        .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code>${escHtml(code.trim())}</code></pre>`)
        .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
        .replace(/\n/g, '<br>');
      div.innerHTML = content;
    } else {
      div.textContent = content;
    }

    if (meta) {
      const m = document.createElement('div');
      m.className = 'msg-meta';
      m.textContent = meta;
      div.appendChild(m);
    }

    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div;
  }

  function addThinking() {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'thinking';
    div.innerHTML = '<span></span><span></span><span></span>';
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div;
  }

  function addFilePreview(file) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'file-preview';
    div.innerHTML = `
      <div class="file-icon">📦</div>
      <div class="file-info">
        <div class="file-name">${file.name}</div>
        <div class="file-size">${(file.size/1024).toFixed(0)} KB</div>
      </div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function addDownloadFiles(files) {
    const area = document.getElementById('chatArea');
    const container = document.createElement('div');
    container.className = 'download-files';
    files.forEach(({ name, content }) => {
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      a.className = 'dl-btn';
      a.innerHTML = `⬇️ ${name}`;
      container.appendChild(a);
    });
    area.appendChild(container);
    area.scrollTop = area.scrollHeight;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function updateStats(tokens) {
    stats.tokens += tokens;
    stats.requests += 1;
    document.getElementById('statsBar').textContent =
      `🔢 Tokens: ${stats.tokens} | Requests: ${stats.requests}`;
  }

  // Read zip file
  async function readZip(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          // JSZip वापरतो
          const JSZip = window.JSZip;
          const zip = await JSZip.loadAsync(e.target.result);
          const codeExts = ['.py','.go','.js','.ts','.java','.cpp','.c','.json','.yaml','.yml','.txt','.html','.css'];
          let allCode = '';
          let fileNames = [];

          for (const [path, zipEntry] of Object.entries(zip.files)) {
            if (zipEntry.dir) continue;
            const fname = path.split('/').pop();
            if (!codeExts.some(ext => fname.endsWith(ext))) continue;
            const content = await zipEntry.async('string');
            allCode += `\n\n### FILE: ${fname} ###\n${content}`;
            fileNames.push(fname);
          }
          resolve({ allCode, fileNames });
        } catch(err) { reject(err); }
      };
      reader.readAsArrayBuffer(file);
    });
  }

  // Chunk large code
  function chunkCode(allCode, maxChars = 12000) {
    if (allCode.length <= maxChars) return [allCode];
    const chunks = [];
    let i = 0;
    while (i < allCode.length) {
      chunks.push(allCode.slice(i, i + maxChars));
      i += maxChars;
    }
    return chunks;
  }

  // Groq API call
  async function callGroq(messages, isCode) {
    const cfg = getConfig();
    const model = isCode ? cfg.codeModel : cfg.chatModel;

    document.getElementById('modelBadge').textContent =
      model.includes('70b') ? '🧠 70B' : '⚡ 8B';

    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${cfg.apiKey}`
      },
      body: JSON.stringify({
        model,
        messages,
        max_tokens: 4096,
        stream: false
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'API Error');
    }

    const data = await res.json();
    return {
      reply: data.choices[0].message.content,
      tokens: data.usage?.total_tokens || 0,
      model
    };
  }

  // Parse changed files from AI response
  function parseChangedFiles(reply) {
    const pattern = /### FILE: (.+?) ###\n([\s\S]*?)(?=### FILE:|$)/g;
    const files = [];
    let match;
    while ((match = pattern.exec(reply)) !== null) {
      files.push({ name: match[1].trim(), content: match[2].trim() });
    }
    return files;
  }

  // Main send
  async function sendMessage() {
    if (isProcessing) return;
    const cfg = getConfig();
    if (!cfg.apiKey) { openConfig(); return; }

    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text && !attachedFile) return;

    isProcessing = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    const file = attachedFile;
    removeFile();

    // Show user message
    if (text) addMsg('user', text);
    if (file) addFilePreview(file);

    const thinking = addThinking();

    try {
      let reply, tokens;

      if (file) {
        // Zip file process
        const { allCode, fileNames } = await readZip(file);

        if (!allCode) {
          thinking.remove();
          addMsg('ai', '❌ Zip मध्ये supported code files नाहीत!');
          return;
        }

        const userPrompt = text || 'या code चं review कर, bugs सांग आणि improvements suggest कर';

        // Chunk करा — context length fix!
        const chunks = chunkCode(allCode, 12000);
        let fullReply = '';

        for (let i = 0; i < chunks.length; i++) {
          const chunkPrompt = chunks.length > 1
            ? `Part ${i+1}/${chunks.length}: ${userPrompt}\n\n${chunks[i]}`
            : `${userPrompt}\n\nAvailable files: ${fileNames.join(', ')}\n\n${chunks[i]}`;

          const messages = [
            {
              role: 'system',
              content: `You are an expert coding assistant.
For code changes: return ONLY changed files using exactly this format:
### FILE: filename.ext ###
<complete file content>

Never stop mid-response. Complete all code blocks.`
            },
            { role: 'user', content: chunkPrompt }
          ];

          const result = await callGroq(messages, true);
          fullReply += result.reply;
          tokens = (tokens || 0) + result.tokens;
        }

        thinking.remove();

        // Parse changed files
        const changedFiles = parseChangedFiles(fullReply);

        if (changedFiles.length > 0) {
          addMsg('ai', `✅ ${changedFiles.length} file(s) updated! | 🔢 Tokens: ${tokens}`);
          addDownloadFiles(changedFiles);
        } else {
          addMsg('ai', fullReply, `🔢 Tokens: ${tokens}`);
        }

        updateStats(tokens);

      } else {
        // Normal text chat
        const isCode = ['code','function','bug','fix','write','error','golang',
          'python','javascript','api','class','implement','refactor','review',
          'optimize'].some(w => text.toLowerCase().includes(w));

        const messages = [
          {
            role: 'system',
            content: 'You are an expert coding assistant. Be precise and concise. Always complete your response fully.'
          },
          { role: 'user', content: text }
        ];

        const result = await callGroq(messages, isCode);
        thinking.remove();
        addMsg('ai', result.reply, `🔢 Tokens: ${result.tokens}`);
        updateStats(result.tokens);
      }

    } catch (err) {
      thinking.remove();
      addMsg('ai', `❌ Error: ${err.message}`);
    } finally {
      isProcessing = false;
      document.getElementById('sendBtn').disabled = false;
    }
  }

  // Init
  checkKey();

  // Load JSZip
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
  document.head.appendChild(script);
</script>

</body>
</html>
